<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Slider de Páginas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f8f8f8;
    }
    #slider {
      width: 90%;
      max-width: 900px;
      margin: 2em auto;
      border: 1px solid #ccc;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 4px 24px #0001;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }
    #pageFrame {
      width: 100%;
      height: 65vh;
      min-height: 400px;
      max-height: 700px;
      border-radius: 10px;
      border: 1px solid #eee;
      box-shadow: 0 2px 8px #0001;
      background: #fafafa;
      margin-bottom: 18px;
      transition: height 0.3s;
    }
    #controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1em;
      flex-wrap: wrap;
    }
    button {
      padding: 10px 22px;
      font-size: 1.1em;
      border-radius: 8px;
      border: none;
      background: linear-gradient(90deg, #43c6ac 0%, #f7971e 100%);
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 2px 8px #0001;
      transition: background 0.2s, transform 0.2s;
    }
    button:disabled {
      background: #ccc;
      color: #888;
      cursor: not-allowed;
      transform: none;
    }
    button:not(:disabled):hover {
      background: linear-gradient(90deg, #f7971e 0%, #43c6ac 100%);
      transform: scale(1.05);
    }
    #counter {
      font-weight: bold;
      font-size: 1.15em;
      color: #43c6ac;
      background: #f8ffae;
      padding: 6px 18px;
      border-radius: 8px;
      box-shadow: 0 1px 4px #0001;
    }
    @media (max-width: 700px) {
      #slider {
        width: 98%;
        padding: 10px 2px;
      }
      #pageFrame {
        height: 45vh;
        min-height: 220px;
      }
      button {
        padding: 8px 12px;
        font-size: 1em;
      }
      #counter {
        font-size: 1em;
        padding: 4px 10px;
      }
    }
    @media (max-width: 480px) {
      #slider {
        padding: 2px 0;
      }
      #pageFrame {
        height: 32vh;
        min-height: 120px;
      }
      #controls {
        flex-direction: column;
        gap: 0.5em;
      }
    }
  </style>
</head>
<body>
  <div id="slider">
    <div id="workspace-controls" style="margin-bottom: 18px; display: flex; flex-wrap: wrap; gap: 1em; align-items: center; justify-content: center;">
      <span style="color:#888;font-size:1em;">Arrastra la esquina inferior derecha para ajustar el tamaño</span>
    </div>
    <div id="resizeHandle" style="position: absolute; right: 18px; bottom: 18px; width: 24px; height: 24px; background: #43c6ac; border-radius: 6px; cursor: nwse-resize; z-index: 10; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px #0002;">
      <svg width="18" height="18" viewBox="0 0 18 18"><polyline points="4,14 14,14 14,4" style="fill:none;stroke:#fff;stroke-width:2"/></svg>
    </div>
    <div style="position: relative; width: 100%;">
      <iframe id="pageFrame" src="" width="100%" height="400px" frameborder="0"></iframe>
    </div>
    <div id="controls">
      <button id="prevBtn">Atrás</button>
      <span id="counter"></span>
      <button id="nextBtn">Adelante</button>
    </div>
  </div>
  <script>
    // Simulación: lista de páginas en la carpeta (esto debe generarse dinámicamente en producción)
    // Manual: agrega aquí los nombres de tus páginas HTML
    const pages = [
      'pagina1.html',
      'pagina2.html',
      // ...
    ].sort(); // Orden alfabético

    let currentPage = 0;

    function renderPage() {
      const frame = document.getElementById('pageFrame');
      const counter = document.getElementById('counter');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      if (pages.length === 0) {
        frame.style.display = 'none';
        counter.textContent = 'No hay páginas disponibles.';
        prevBtn.disabled = true;
        nextBtn.disabled = true;
      } else {
        frame.style.display = '';
        frame.src = pages[currentPage];
        counter.textContent = `Página ${currentPage + 1} de ${pages.length}`;
        prevBtn.disabled = currentPage === 0;
        nextBtn.disabled = currentPage === pages.length - 1;
      }
    }

    document.getElementById('prevBtn').onclick = function() {
      if (currentPage > 0) {
        currentPage--;
        renderPage();
      }
    };

    document.getElementById('nextBtn').onclick = function() {
      if (currentPage < pages.length - 1) {
        currentPage++;
        renderPage();
      }
    };

    // Inicializa el slider
    renderPage();

    // Redimensionar con el mouse
    const sliderDiv = document.getElementById('slider');
    const pageFrame = document.getElementById('pageFrame');
    const resizeHandle = document.getElementById('resizeHandle');
    let isResizing = false;
    let startX, startY, startWidth, startHeight;

    resizeHandle.addEventListener('mousedown', function(e) {
      isResizing = true;
      startX = e.clientX;
      startY = e.clientY;
      startWidth = sliderDiv.offsetWidth;
      startHeight = pageFrame.offsetHeight;
      document.body.style.userSelect = 'none';
    });

    document.addEventListener('mousemove', function(e) {
      if (!isResizing) return;
      let newWidth = Math.max(300, Math.min(1600, startWidth + (e.clientX - startX)));
      let newHeight = Math.max(120, Math.min(1000, startHeight + (e.clientY - startY)));
      sliderDiv.style.maxWidth = newWidth + 'px';
      pageFrame.style.height = newHeight + 'px';
    });

    document.addEventListener('mouseup', function(e) {
      if (isResizing) {
        isResizing = false;
        document.body.style.userSelect = '';
      }
    });
  </script>
</body>
</html>
