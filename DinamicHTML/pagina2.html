<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Módulo 1: Introducción a la IA Generativa</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #f8ffae 0%, #43c6ac 100%);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: rgba(255,255,255,0.97);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(60,60,60,0.18);
      padding: 2.5em 2em;
      max-width: 540px;
      text-align: left;
      animation: bounceIn 1s;
    }
    h1 {
      font-size: 2em;
      margin-bottom: 0.5em;
      color: #43c6ac;
      text-shadow: 1px 1px 0 #fff;
    }
    .emoji {
      font-size: 2.2em;
      margin-bottom: 0.2em;
      animation: wiggle 1.2s infinite;
      display: inline-block;
    }
    h2 {
      color: #f7971e;
      margin-top: 1.2em;
      margin-bottom: 0.5em;
    }
    ul {
      margin: 1em 0 1em 1em;
      font-size: 1.1em;
    }
    li {
      margin-bottom: 0.7em;
      position: relative;
      padding-left: 1.2em;
    }
    li:before {
      content: '🤖';
      position: absolute;
      left: 0;
      top: 0;
      font-size: 1em;
      color: #43c6ac;
      animation: sparkle 2s infinite;
    }
    @keyframes bounceIn {
      0% { transform: scale(0.7); opacity: 0; }
      80% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); }
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(-10deg); }
      50% { transform: rotate(10deg); }
    }
    @keyframes sparkle {
      0%, 100% { color: #43c6ac; }
      50% { color: #f7971e; }
    }
    .section {
      background: #f7971e22;
      border-radius: 10px;
      padding: 1em;
      margin-bottom: 1.2em;
      font-size: 1.08em;
      color: #333;
      box-shadow: 0 2px 8px #f7971e22;
    }
    .tools {
      display: flex;
      gap: 1em;
      flex-wrap: wrap;
      margin-top: 1em;
    }
    .tool {
      background: #43c6ac22;
      border-radius: 8px;
      padding: 0.7em 1em;
      font-weight: bold;
      color: #222;
      box-shadow: 0 1px 4px #43c6ac22;
      display: flex;
      align-items: center;
      gap: 0.5em;
    }
    .tool span {
      font-size: 1.3em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🧠</div>
    <h1>Módulo 1: Introducción a la IA Generativa</h1>
    <div class="section">
      <h2>¿Qué es la IA generativa?</h2>
      <ul>
        <li>Conceptos básicos sin tecnicismos</li>
        <li>Diferencias entre IA tradicional y generativa</li>
        <li>Principales herramientas disponibles:</li>
      </ul>
      <div class="tools">
        <div class="tool"><span>💬</span>ChatGPT</div>
        <div class="tool"><span>🤖</span>Claude</div>
        <div class="tool"><span>🔮</span>Gemini</div>
      </div>
    </div>
  </div>
</body>
</html>
